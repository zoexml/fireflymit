name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/ui/**'
      - 'packages/hooks/**'
      - '.changeset/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ui/**'
      - 'packages/hooks/**'
      - '.changeset/**'

  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Check if versions changed
        id: version-check
        run: |
          CHANGED=false
          UI_CURRENT=$(node -p "require('./packages/ui/package.json').version")
          UI_PREV=$(git show HEAD~1:packages/ui/package.json | jq -r '.version')
          if [ "$UI_CURRENT" != "$UI_PREV" ]; then
            CHANGED=true
            echo "UI: $UI_PREV -> $UI_CURRENT"
          fi

          HOOKS_CURRENT=$(node -p "require('./packages/hooks/package.json').version")
          HOOKS_PREV=$(git show HEAD~1:packages/hooks/package.json | jq -r '.version')
          if [ "$HOOKS_CURRENT" != "$HOOKS_PREV" ]; then
            CHANGED=true
            echo "hooks: $HOOKS_PREV -> $HOOKS_CURRENT"
          fi

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.version-check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        if: steps.version-check.outputs.changed == 'true'
        name: Install pnpm
        with:
          run_install: false

      - name: Install dependencies
        if: steps.version-check.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        if: steps.version-check.outputs.changed == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm ci:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.FFM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
