name: 📚 Deploy Docs

on:
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# 设置GITHUB_TOKEN的权限，以允许部署到GITHUB页面
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm check-types
      - name: Test
        run: pnpm test
      - name: Build VitePress
        run: pnpm build:docs
      - name: Build UI
        run: pnpm build:ui
      - name: Build Storybook
        run: pnpm build:storybook
      - name: Merge outputs
        run: |
          mkdir -p docs/.vitepress/dist/ui
          cp -r .storybook/dist/* docs/.vitepress/dist/ui/
          cat > docs/.vitepress/dist/ui/404.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0;url=/fireflymit/ui/">
            <script>
              location.href = '/fireflymit/ui/';
            </script>
          </head>
          <body><a href="/fireflymit/ui/">Go to Storybook</a></body>
          </html>
          HTML
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
