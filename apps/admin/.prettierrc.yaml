# 单参数箭头函数始终添加括号
arrowParens: 'always'
# JSX 多行元素的闭合标签另起一行
bracketSameLine: false
# 对象字面量括号之间添加空格 { foo: bar }
bracketSpacing: true
# 自动格式化嵌入的代码（Markdown/HTML 内的代码块）
embeddedLanguageFormatting: 'auto'
# HTML 空白敏感度，CSS 模式保留 display 相关空白
htmlWhitespaceSensitivity: 'css'
# 不插入 @prettier 的 pragma 注释
insertPragma: false
# JSX 中使用双引号
jsxSingleQuote: false
# 每行最大长度
printWidth: 100
# Markdown 换行保留原格式
proseWrap: 'preserve'
# 对象属性仅在必要时添加引号
quoteProps: 'as-needed'
# 不要求文件开头有 @prettier 的 pragma 注释
requirePragma: false
# 语句末尾不添加分号
semi: false
# 使用单引号
singleQuote: true
# 缩进 2 个空格
tabWidth: 2
# 多行尾随逗号（ES5 支持的对象、数组等）
trailingComma: 'es5'
# 使用空格而非制表符缩进
useTabs: false
# Vue 文件 <script> 和 <style> 不额外缩进
vueIndentScriptAndStyle: false
# 换行符自动检测（LF / CRLF）
endOfLine: 'auto'
# HTML 文件使用专用解析器
overrides:
  - files: '*.html'
    options:
      parser: 'html'
